<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch Chạy Xe</title>
    <script src="https://www.gstatic.com/firebasejs/9.18.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.18.0/firebase-database-compat.js"></script>
    <style>
        :root { color-scheme: light; } 
        body { font-family: sans-serif; background-color: #ffffff; color: #333; margin: 0; padding: 15px; }
        .container { max-width: 500px; margin: auto; }
        h2 { text-align: center; color: #333; margin-bottom: 20px; }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; background-color: #fff; color: #000; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn-add { background-color: #28a745; color: white; border: none; flex: 2; padding: 12px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .btn-excel { background-color: #007bff; color: white; border: none; flex: 1; padding: 12px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-delete-old { background-color: #dc3545; color: white; border: none; width: 100%; margin-top: 10px; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .summary-box { background: #f8f9fa; border: 1px solid #ddd; padding: 15px; border-radius: 8px; margin-top: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .summary-item { font-size: 14px; font-weight: bold; }
        .summary-val { color: #d9534f; }
        
        .section-title { 
            background: #f4f4f4; 
            padding: 15px; 
            margin-top: 25px; 
            font-weight: bold; 
            border-bottom: 3px solid #007bff; 
            text-transform: uppercase;
            text-align: center; 
            font-size: 20px; 
            color: #007bff;
        }

        .trip-item { border-bottom: 1px solid #eee; padding: 12px 0; position: relative; border-left: 5px solid transparent; }
        .trip-info p { margin: 4px 0; font-size: 13px; color: #444; }
        .time-highlight { color: #d9534f; font-size: 16px; font-weight: 800; background: #fff0f0; padding: 2px 6px; border-radius: 4px; }
        .completed-trip { border-left: 5px solid #28a745; background-color: #f0fff4; opacity: 0.9; }
        .driver-tag { font-size: 11px; padding: 2px 6px; border-radius: 3px; color: white; font-weight: bold; margin-top: 5px; display: inline-block; }
        .tag-nha { background: #28a745; }
        .tag-muon { background: #ffc107; color: #000; }
        .action-btns { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 8px; }
        .btn-call { background: #28a745; color: white; text-decoration: none; padding: 8px 12px; border-radius: 4px; font-size: 12px; font-weight: bold; display: flex; align-items: center; }
        .btn-edit { background: #ffc107; color: black; border: none; padding: 8px 12px; border-radius: 4px; font-size: 12px; cursor: pointer; font-weight: bold; }
        .btn-done { background: #6c757d; color: white; border: none; padding: 8px 12px; border-radius: 4px; font-size: 12px; cursor: pointer; font-weight: bold; }
        .btn-done.is-completed { background: #28a745; }
        .btn-delete-trip { background: #dc3545; color: white; border: none; padding: 8px 12px; border-radius: 4px; font-size: 12px; cursor: pointer; font-weight: bold; }
        #hiredDriverFields { display: none; background: #fff9e6; padding: 10px; border-radius: 5px; border: 1px dashed #ffc107; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2>LỊCH CHẠY XE</h2>
    <input type="hidden" id="editKey">
    <div class="form-group"><label>Thời gian rước</label><input type="datetime-local" id="time"></div>
    <div class="form-group"><label>Điểm đi</label><input type="text" id="from"></div>
    <div class="form-group"><label>Điểm đến</label><input type="text" id="to"></div>
    <div class="form-group"><label>SĐT/Tên Khách</label><input type="text" id="phone"></div>
    <div class="form-group"><label>Ghi chú</label><textarea id="note" rows="2"></textarea></div>
    
    <div style="display: flex; gap: 10px;">
        <div class="form-group" style="flex: 1;"><label>Giá chuyến</label><input type="number" id="price"></div>
        <div class="form-group" style="flex: 1;"><label>Số KM</label><input type="number" id="km"></div>
    </div>
    
    <div style="display: flex; gap: 10px;">
        <div class="form-group" style="flex: 1;"><label>Giá xăng/lít</label><input type="number" id="gasPrice" value="24220"></div>
        <div class="form-group" style="flex: 1;"><label>Cầu đường</label><input type="number" id="road"></div>
    </div>
    
    <div class="form-group">
        <label>Loại tài xế</label>
        <select id="driverType" onchange="toggleDriverFields()">
            <option value="Tài xế nhà">Tài xế nhà</option>
            <option value="Tài xế mướn">Tài xế mướn</option>
        </select>
    </div>
    <div id="hiredDriverFields">
        <div class="form-group"><label>Tên/SĐT Tài xế mướn</label><input type="text" id="hiredDriverName"></div>
        <div class="form-group"><label>Tiền thuê tài xế</label><input type="number" id="driverCost"></div>
    </div>
    
    <div class="btn-group">
        <button id="mainBtn" class="btn-add" onclick="saveTrip()">THÊM CHUYẾN</button>
        <button class="btn-excel" onclick="exportToExcel()">XUẤT EXCEL</button>
    </div>
    <button class="btn-delete-old" onclick="deleteOldData()">Xoá dữ liệu tháng cũ</button>
    
    <div class="summary-box">
        <div class="summary-item">Tổng chuyến: <span id="totalTrips" class="summary-val">0</span></div>
        <div class="summary-item">Doanh thu: <span id="totalRev" class="summary-val">0</span></div>
        <div class="summary-item">Chi phí: <span id="totalCost" class="summary-val">0</span></div>
        <div class="summary-item">Lợi nhuận: <span id="totalProfit" class="summary-val">0</span></div>
    </div>
    <hr>
    <div id="displayArea">
        <div class="section-title">HÔM NAY</div><div id="todayList"></div>
        <div class="section-title">SẮP TỚI</div><div id="upcomingList"></div>
        <div class="section-title">ĐÃ QUA</div><div id="pastList"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAuZTf_5Z3VgnM1rumgsqGBb-O7-Gn4oxE",
        authDomain: "nha-xe-ee5e8.firebaseapp.com",
        databaseURL: "https://nha-xe-ee5e8-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "nha-xe-ee5e8",
        storageBucket: "nha-xe-ee5e8.firebasestorage.app",
        messagingSenderId: "460075860243",
        appId: "1:460075860243:web:f0826865398e2ddcf05ae6"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let trips = {};

    db.ref('trips').on('value', (snapshot) => {
        trips = snapshot.val() || {};
        renderTrips();
    });

    function toggleDriverFields() {
        const type = document.getElementById('driverType').value;
        document.getElementById('hiredDriverFields').style.display = (type === "Tài xế mướn") ? "block" : "none";
    }

    function formatNumber(num) { return num.toLocaleString('vi-VN'); }

    function formatDateTime(dtStr) {
        if(!dtStr) return "";
        const d = new Date(dtStr);
        return `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')} ${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}/${d.getFullYear()}`;
    }

    function saveTrip() {
        const key = document.getElementById('editKey').value;
        const tripData = {
            time: document.getElementById('time').value,
            from: document.getElementById('from').value,
            to: document.getElementById('to').value,
            phone: document.getElementById('phone').value,
            note: document.getElementById('note').value || "",
            price: Number(document.getElementById('price').value) || 0,
            km: Number(document.getElementById('km').value) || 0,
            gasPrice: Number(document.getElementById('gasPrice').value) || 24220,
            road: Number(document.getElementById('road').value) || 0,
            driverType: document.getElementById('driverType').value,
            hiredDriverName: document.getElementById('hiredDriverName').value || "",
            driverCost: Number(document.getElementById('driverCost').value) || 0,
            status: key ? (trips[key].status || "pending") : "pending"
        };
        if(!tripData.time || !tripData.from) return alert("Thiếu thông tin!");
        if(key) db.ref('trips/' + key).update(tripData);
        else db.ref('trips').push(tripData);
        resetForm();
    }

    function toggleComplete(key) {
        const newStatus = trips[key].status === "completed" ? "pending" : "completed";
        db.ref('trips/' + key).update({ status: newStatus });
    }

    function deleteTrip(key) {
        if(confirm("Xoá chuyến này?")) db.ref('trips/' + key).remove();
    }

    function renderTrips() {
        const lists = { today: document.getElementById('todayList'), upcoming: document.getElementById('upcomingList'), past: document.getElementById('pastList') };
        Object.values(lists).forEach(l => l.innerHTML = '');
        let totalRev = 0, totalCost = 0, tripCount = 0;
        const nowDayStr = new Date().toLocaleDateString('en-CA');
        const sortedKeys = Object.keys(trips).sort((a, b) => new Date(trips[a].time) - new Date(trips[b].time));

        sortedKeys.forEach(key => {
            const trip = trips[key];
            const isDone = trip.status === "completed";
            const tripDayStr = trip.time.split('T')[0];
            const fuel = Math.round((trip.km / 15) * (trip.gasPrice || 24220));
            const totalTripCost = fuel + Number(trip.road) + Number(trip.driverCost || 0);
            const netProfit = trip.price - totalTripCost;
            
            tripCount++; totalRev += Number(trip.price); totalCost += totalTripCost;

            const html = `
                <div class="trip-item ${isDone ? 'completed-trip' : ''}">
                    <div class="trip-info">
                        <strong>${trip.from} ➝ ${trip.to}</strong>
                        <p>⏰ <span class="time-highlight">${formatDateTime(trip.time)}</span></p>
                        <p>📞 Khách: ${trip.phone}</p>
                        ${trip.driverType === 'Tài xế mướn' ? `<p>👤 Tài xế: ${trip.hiredDriverName}</p>` : ''}
                        <p>💰 Thu: ${formatNumber(trip.price)}đ | 📉 Chi: ${formatNumber(totalTripCost)}đ</p>
                        <p>💎 Thực lãi: <span style="color:#28a745; font-weight:bold;">${formatNumber(netProfit)}đ</span></p>
                        <span class="driver-tag ${trip.driverType === 'Tài xế nhà' ? 'tag-nha' : 'tag-muon'}">${trip.driverType}</span>
                        <div class="action-btns">
                            <a href="tel:${trip.phone}" class="btn-call">📞 GỌI</a>
                            <button class="btn-edit" onclick="editTrip('${key}')">✏️ SỬA</button>
                            <button class="btn-done ${isDone ? 'is-completed' : ''}" onclick="toggleComplete('${key}')">${isDone ? 'HOÀN TẤT' : 'XỬ LÝ'}</button>
                            <button class="btn-delete-trip" onclick="deleteTrip('${key}')">🗑️</button>
                        </div>
                    </div>
                </div>`;

            if (tripDayStr === nowDayStr) lists.today.innerHTML += html;
            else if (tripDayStr > nowDayStr) lists.upcoming.innerHTML += html;
            else lists.past.innerHTML += html;
        });

        document.getElementById('totalTrips').innerText = tripCount;
        document.getElementById('totalRev').innerText = formatNumber(totalRev) + "đ";
        document.getElementById('totalCost').innerText = formatNumber(totalCost) + "đ";
        document.getElementById('totalProfit').innerText = formatNumber(totalRev - totalCost) + "đ";
    }

    function editTrip(key) {
        const t = trips[key];
        document.getElementById('editKey').value = key;
        document.getElementById('time').value = t.time;
        document.getElementById('from').value = t.from;
        document.getElementById('to').value = t.to;
        document.getElementById('phone').value = t.phone;
        document.getElementById('note').value = t.note || "";
        document.getElementById('price').value = t.price;
        document.getElementById('km').value = t.km;
        document.getElementById('road').value = t.road;
        document.getElementById('gasPrice').value = t.gasPrice || 24220;
        document.getElementById('driverType').value = t.driverType;
        document.getElementById('hiredDriverName').value = t.hiredDriverName || "";
        document.getElementById('driverCost').value = t.driverCost || 0;
        toggleDriverFields();
        document.getElementById('mainBtn').innerText = "CẬP NHẬT";
        window.scrollTo(0,0);
    }

    function resetForm() {
        document.getElementById('editKey').value = '';
        document.getElementById('mainBtn').innerText = "THÊM CHUYẾN";
        ['time', 'from', 'to', 'phone', 'note', 'price', 'km', 'road', 'hiredDriverName', 'driverCost'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('gasPrice').value = 24220;
        document.getElementById('driverType').value = "Tài xế nhà";
        toggleDriverFields();
    }

    // GIẢI PHÁP MỚI: XUẤT FILE ĐỊNH DẠNG XML/HTML ĐỂ EXCEL ĐỌC ĐÚNG TIẾNG VIỆT
    function exportToExcel() {
        const sortedData = Object.values(trips).sort((a, b) => new Date(a.time) - new Date(b.time));
        if(!sortedData.length) return alert("Không có dữ liệu!");

        let tableHtml = `
            <html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40">
            <head><meta charset="utf-8"></head>
            <body>
                <table border="1">
                    <tr style="background-color: #007bff; color: white; font-weight: bold;">
                        <td>Trạng Thái</td><td>Thời Gian</td><td>Điểm Đi</td><td>Điểm Đến</td>
                        <td>Khách</td><td>Tài Xế Mướn</td><td>Doanh Thu</td><td>Số KM</td>
                        <td>Tiền Xăng</td><td>Cầu Đường</td><td>Tiền Thuê Tài Xế</td><td>Thực Lãi</td><td>Ghi chú</td>
                    </tr>`;

        sortedData.forEach(item => {
            const fuel = Math.round((item.km / 15) * (item.gasPrice || 24220));
            const totalTripCost = fuel + Number(item.road) + Number(item.driverCost || 0);
            tableHtml += `
                <tr>
                    <td>${item.status === "completed" ? "Xong" : "Chờ"}</td>
                    <td>${formatDateTime(item.time)}</td>
                    <td>${item.from}</td><td>${item.to}</td><td>${item.phone}</td>
                    <td>${item.hiredDriverName || ''}</td>
                    <td>${item.price}</td><td>${item.km}</td><td>${fuel}</td>
                    <td>${item.road}</td><td>${item.driverCost || 0}</td>
                    <td>${item.price - totalTripCost}</td>
                    <td>${item.note || ''}</td>
                </tr>`;
        });

        tableHtml += `</table></body></html>`;

        const blob = new Blob([tableHtml], { type: 'application/vnd.ms-excel' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "Bao_Cao_Chay_Xe.xls"; // Đuôi .xls để Excel nhận diện bảng
        link.click();
    }

    function deleteOldData() {
        if(confirm("Xoá dữ liệu tháng cũ?")) {
            const firstDay = new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString().split('T')[0];
            for (let key in trips) { if (trips[key].time < firstDay) db.ref('trips/' + key).remove(); }
        }
    }
</script>
</body>
</html>
